<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nourish the Needy | Admin</title>
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body {
        background: #fff3f8;
      }

      .admin-shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .admin-header {
        padding: 1.5rem 8vw;
        border-bottom: 1px solid #f1d3e5;
        background: linear-gradient(180deg, #fff7fb 0%, #fff0f7 100%);
      }

      .admin-header h1 {
        font-size: clamp(2rem, 4vw, 2.6rem);
        margin-bottom: 0.5rem;
      }

      .admin-content {
        padding: 2rem 8vw 4rem;
        display: grid;
        gap: 2rem;
        grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
      }

      .admin-card {
        background: #ffffff;
        border: 1px solid #f1d3e5;
        border-radius: 18px;
        padding: 1.5rem;
        box-shadow: 0 18px 30px rgba(178, 93, 140, 0.08);
      }

      .admin-card h2 {
        margin-bottom: 0.75rem;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
        margin-bottom: 1rem;
      }

      .field input,
      .field textarea {
        padding: 0.65rem 0.8rem;
        border-radius: 12px;
        border: 1px solid #f1d3e5;
        background: #fff7fb;
        font: inherit;
      }

      .field textarea {
        min-height: 90px;
        resize: vertical;
      }

      .admin-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
      }

      .admin-actions .btn {
        width: auto;
      }

      .admin-list {
        display: grid;
        gap: 0.75rem;
      }

      .admin-list button {
        text-align: left;
      }

      .admin-status {
        color: var(--muted);
        font-size: 0.95rem;
      }

      @media (max-width: 900px) {
        .admin-content {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="admin-shell">
      <header class="admin-header">
        <p class="tag">Nourish the Needy Admin</p>
        <h1>Manage cook day posts</h1>
        <p class="lead">
          Sign in with Google, add your post details, then publish to update the
          public site.
        </p>
      </header>

      <main class="admin-content">
        <section class="admin-card">
          <h2>Sign in</h2>
          <p class="admin-status" id="auth-status">Not signed in.</p>
          <div class="admin-actions">
            <button class="btn primary" id="login-btn">Sign in with Google</button>
            <button class="btn ghost" id="logout-btn" disabled>Sign out</button>
          </div>
        </section>

        <section class="admin-card">
          <h2>Write a post</h2>
          <form id="post-form">
            <div class="field">
              <label for="title">Title</label>
              <input id="title" name="title" required />
            </div>
            <div class="field">
              <label for="date">Date</label>
              <input id="date" name="date" type="date" required />
            </div>
            <div class="field">
              <label for="summary">Summary</label>
              <textarea id="summary" name="summary" required></textarea>
            </div>
            <div class="field">
              <label for="meals">Meals served</label>
              <input id="meals" name="meals" type="number" min="0" />
            </div>
            <div class="field">
              <label for="receiptTotal">Receipt total (ex: 84.40)</label>
              <input id="receiptTotal" name="receiptTotal" />
            </div>
            <div class="field">
              <label for="images">Image URLs (one per line)</label>
              <textarea id="images" name="images"></textarea>
            </div>
            <div class="field">
              <label for="video">Video URL</label>
              <input id="video" name="video" />
            </div>
            <div class="admin-actions">
              <button class="btn primary" type="submit" id="save-btn">
                Publish post
              </button>
              <button class="btn ghost" type="button" id="reset-btn">
                Clear form
              </button>
            </div>
          </form>
        </section>

        <section class="admin-card">
          <h2>Recent posts</h2>
          <div class="admin-list" id="post-list"></div>
        </section>
      </main>
    </div>

    <script src="../firebase-config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
